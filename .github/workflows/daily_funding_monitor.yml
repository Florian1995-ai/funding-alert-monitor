name: Daily Funding Monitor

on:
  schedule:
    # Run 3x daily: 8am, 1pm, 6pm UTC
    - cron: '0 8 * * *'
    - cron: '0 13 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  monitor-and-draft:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set up environment
        run: |
          echo "TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }}" >> .env
          echo "EXA_API_KEY=${{ secrets.EXA_API_KEY }}" >> .env
          echo "PERPLEXITY_API_KEY=${{ secrets.PERPLEXITY_API_KEY }}" >> .env
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env

      - name: Set up Gmail token
        run: echo '${{ secrets.GMAIL_TOKEN_JORGE }}' > token_jorge_gmail.json

      - name: Run funding monitor
        run: python execution/funding_monitor_hybrid.py

      - name: Run pipeline for new companies
        run: |
          python execution/jorge_mvp_orchestrator.py \
            --region us --limit 3 --days 1 \
            --send --target jorge

      - name: Upload research reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: research-reports-${{ github.run_number }}
          path: .tmp/deep_research/
          retention-days: 30
